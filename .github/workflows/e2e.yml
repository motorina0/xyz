name: E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run quality:all

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  e2e-smoke:
    name: E2E ${{ matrix.name }}
    needs:
      - quality
      - unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth
            script: test:e2e:auth-smoke
          - name: contacts
            script: test:e2e:contacts-smoke
          - name: dm
            script: test:e2e:dm-smoke
          - name: groups
            script: test:e2e:groups-smoke
          - name: relays
            script: test:e2e:relays-smoke
          - name: session
            script: test:e2e:session-smoke

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start local relay
        run: docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for relay startup
        run: sleep 10

      - name: Run ${{ matrix.name }} e2e smoke tests
        run: npm run ${{ matrix.script }}

      - name: Stop local relay
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v --remove-orphans

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.name }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
