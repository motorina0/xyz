import groovy.json.JsonSlurper

apply plugin: 'com.android.application'

def readAndroidConfigValue = { String name ->
    def envValue = System.getenv(name)
    if (envValue != null && envValue.trim()) {
        return envValue.trim()
    }

    if (project.hasProperty(name)) {
        def propValue = project.property(name)
        if (propValue != null && propValue.toString().trim()) {
            return propValue.toString().trim()
        }
    }

    return null
}

def capacitorPackageJson = new JsonSlurper().parse(file("${rootDir}/../package.json"))
def resolvedVersionName = readAndroidConfigValue('ANDROID_VERSION_NAME') ?: capacitorPackageJson.version ?: '1.0.0'
def resolvedVersionCode = Integer.parseInt(readAndroidConfigValue('ANDROID_VERSION_CODE') ?: "${capacitorPackageJson.androidVersionCode ?: 1}")

def releaseKeystorePath = readAndroidConfigValue('ANDROID_KEYSTORE_PATH')
def releaseKeystorePassword = readAndroidConfigValue('ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = readAndroidConfigValue('ANDROID_KEY_ALIAS')
def releaseKeyPassword = readAndroidConfigValue('ANDROID_KEY_PASSWORD')
def releaseKeystoreFile = releaseKeystorePath ? rootProject.file(releaseKeystorePath) : null
def hasReleaseSigning = releaseKeystoreFile != null && [releaseKeystorePassword, releaseKeyAlias, releaseKeyPassword].every { it }

if (releaseKeystoreFile != null && releaseKeystoreFile.exists() == false) {
    throw new GradleException("ANDROID_KEYSTORE_PATH does not exist: ${releaseKeystoreFile}")
}

android {
    namespace "com.lnbits.nostrchat"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.lnbits.nostrchat"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolvedVersionCode
        versionName resolvedVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile releaseKeystoreFile
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
