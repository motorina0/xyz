services:
  push-gateway:
    image: nostr-chat-push-gateway:latest
    build:
      context: ./services/push-gateway
      dockerfile: Dockerfile
    ports:
      - '${PUSH_GATEWAY_PORT:-8787}:8787'
    environment:
      PORT: '8787'
      DATABASE_PATH: /app/data/push-gateway.sqlite
      PUBLIC_GATEWAY_BASE_URL: ${PUBLIC_GATEWAY_BASE_URL:-http://localhost:8787}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      NIP98_MAX_CLOCK_SKEW_SECONDS: ${NIP98_MAX_CLOCK_SKEW_SECONDS:-60}
      RELAY_CONNECT_TIMEOUT_MS: ${RELAY_CONNECT_TIMEOUT_MS:-10000}
      RELAY_IDLE_RESTART_MS: ${RELAY_IDLE_RESTART_MS:-300000}
    volumes:
      - push-gateway-data:/app/data

volumes:
  push-gateway-data:
